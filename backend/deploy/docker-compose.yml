# Runs the FreeTokensPoker backend on a single VM (e.g. Oracle Cloud Always Free)
# behind Caddy, which terminates TLS and transparently proxies WebSockets.
#
# Single instance by design: the realtime hub is in-memory with no backplane
# (internal/realtime/hub.go). Do not run more than one `api` replica.
#
# Usage on the VM (from backend/deploy/):
#   cp .env.example .env   # then fill in real values
#   docker compose up -d --build

services:
  api:
    build:
      context: ..            # backend/ (has the Dockerfile)
      dockerfile: Dockerfile
    env_file: .env
    expose:
      - "8080"               # internal only; Caddy is the public entrypoint
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    depends_on:
      - api
    ports:
      - "80:80"              # HTTP (ACME challenge + redirect to HTTPS)
      - "443:443"            # HTTPS + WSS
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data     # persists Let's Encrypt certs across restarts
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
