services:
  mongo:
    image: mongo:7
    container_name: ftp-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: ftp-api
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      APP_ENV: development
      PORT: "8080"
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB: freetokenspoker
      JWT_SECRET: dev-insecure-secret-change-me
      CORS_ORIGINS: http://localhost:5173,http://localhost:4173
    ports:
      - "8080:8080"

volumes:
  mongo_data:
